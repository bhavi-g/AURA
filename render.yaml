services:
  - type: web
    name: aura-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://your-backend-service.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
